name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 强制配置 Java 17 环境 (安卓编译的刚需)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flet and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Linux Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang cmake pkg-config libgtk-3-dev
      
      - name: Build APK using Flet
        # Flet 官方命令行工具，直接将 Python 代码编译为安卓 APK
        run: flet build apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          # 打包产物通常位于 build/apk 目录下
          path: build/apk/*.apk
