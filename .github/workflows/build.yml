name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 保留强制使用 Node 24，删除冲突的另一行配置
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 强制配置 Java 17 环境 (安卓编译的刚需)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flet and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Linux Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang cmake pkg-config libgtk-3-dev
      
      - name: Build APK using Flet
        # 使用 yes | 强行自动回复 "y"，解决云端无法手动确认安装 SDK 的报错
        run: yes | flet build apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          # 打包产物通常位于 build/apk 目录下
          path: build/apk/*.apk
